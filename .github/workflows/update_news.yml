name: GlobeGuard Live Data Bot

# When should the robot wake up?
on:
  schedule:
    - cron: '0 * * * *' # Wakes up exactly at the top of every hour (24/7)
  workflow_dispatch: # Gives us a manual "Run Now" button to test it!

jobs:
  update-data:
    runs-on: ubuntu-latest # The robot uses a Linux computer
    
    steps:
      - name: 📥 Grab the latest code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ Install the Engine Tools
        run: python -m pip install requests google-generativeai

      - name: 🧠 Run the AI Brain
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: python engine.py

      - name: 📤 Save and Upload to Website
        run: |
          git config --global user.name "GlobeGuard Bot"
          git config --global user.email "bot@globeguard.local"
          git add alerts.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update live global data" && git push)