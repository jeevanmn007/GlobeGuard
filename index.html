<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobeGuard | Survival & Investment Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌍 GlobeGuard</h1>
        <p>Real-Time Global Survival & Investment Tracker</p>
    </header>

    <main>
        <section class="card alert">
            <h2>🚨 URGENT: Survival & Resources</h2>
            <ul id="survival-list" class="news-list">
                <li>Loading live data...</li>
            </ul>
        </section>

        <section class="card stock">
            <h2>📈 BUY: Market Opportunities</h2>
            <ul id="stock-list" class="news-list">
                <li>Loading live data...</li>
            </ul>
        </section>

        <section class="card trend">
            <h2>💡 NEW TREND: Products & Solutions</h2>
            <ul id="trend-list" class="news-list">
                <li>Loading live data...</li>
            </ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
